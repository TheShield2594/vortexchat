# Local development only — for production use docker-compose.production.yml
# Production: web + signal → Dokploy/Portainer, database → Supabase Cloud
version: '3.8'

services:
  # ─── Vortex Web (Next.js) ────────────────────────────────────────────────────
  web:
    build:
      context: .
      dockerfile: apps/web/Dockerfile
    ports:
      - "3000:3000"
    environment:
      NODE_ENV: production
    env_file:
      - ./apps/web/.env.local
    restart: unless-stopped

  # ─── Vortex Signaling Server (Node.js WebRTC) ────────────────────────────────
  signal:
    build:
      context: .
      dockerfile: apps/signal/Dockerfile
    ports:
      - "3001:3001"
    env_file:
      - ./apps/signal/.env
    restart: unless-stopped
    environment:
      NODE_ENV: production

networks:
  default:
    name: vortex_network
