##############################################################################
#  VortexChat — Self-Hosted Docker Compose
#
#  Usage:
#    1. Run the bootstrap script first:  ./scripts/setup.sh
#    2. Then:  docker compose up -d
#
#  This file starts the VortexChat application stack:
#    - web      — Next.js frontend + API routes
#    - signal   — Socket.IO signaling server (WebRTC, presence, gateway)
#    - redis    — Shared cache, rate limiting, event bus
#    - cron     — Periodic task runner (replaces Vercel Cron)
#
#  Your database (Supabase Cloud, self-hosted Supabase, or plain Postgres)
#  is configured via env vars — that's your choice, not ours.
##############################################################################

services:
  # ─── Redis ──────────────────────────────────────────────────────────────────
  redis:
    image: redis:7-alpine
    restart: unless-stopped
    volumes:
      - redis_data:/data
    command: >
      redis-server
        --appendonly yes
        --maxmemory 256mb
        --maxmemory-policy allkeys-lru
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 3s
      retries: 5
    networks:
      - vortex

  # ─── Vortex Web (Next.js) ──────────────────────────────────────────────────
  web:
    build:
      context: .
      dockerfile: apps/web/Dockerfile
    ports:
      - "${WEB_PORT:-3000}:3000"
    env_file:
      - .env
    environment:
      NODE_ENV: production
      REDIS_URL: redis://redis:6379
    depends_on:
      redis:
        condition: service_healthy
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "node", "-e", "const http=require('http'); http.get('http://127.0.0.1:3000/api/health', (res) => process.exit(res.statusCode === 200 ? 0 : 1)).on('error', () => process.exit(1))"]
      interval: 30s
      timeout: 5s
      start_period: 30s
      retries: 3
    networks:
      - vortex

  # ─── Signal Server (Socket.IO + WebRTC) ────────────────────────────────────
  signal:
    build:
      context: .
      dockerfile: apps/signal/Dockerfile
    ports:
      - "${SIGNAL_PORT:-3001}:3001"
    env_file:
      - .env
    environment:
      NODE_ENV: production
      PORT: 3001
      REDIS_URL: redis://redis:6379
      ALLOWED_ORIGINS: ${NEXT_PUBLIC_APP_URL:-http://localhost:3000}
    depends_on:
      redis:
        condition: service_healthy
    restart: unless-stopped
    networks:
      - vortex

  # ─── Cron Runner ───────────────────────────────────────────────────────────
  cron:
    build:
      context: apps/cron
      dockerfile: Dockerfile
    env_file:
      - .env
    environment:
      WEB_URL: http://web:3000
    depends_on:
      web:
        condition: service_healthy
    restart: unless-stopped
    networks:
      - vortex

volumes:
  redis_data:

networks:
  vortex:
    name: vortex_network
