<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 210">
  <rect width="200" height="210" fill="white"/>
  
  <!-- ===== TOP TORUS/RING ===== -->
  <!-- Outer filled ellipse (the ring base) -->
  <ellipse cx="100" cy="52" rx="68" ry="24" fill="#364152"/>
  <!-- Inner cutout (the hole of the torus) - shifted slightly right for 3D effect -->
  <ellipse cx="106" cy="51" rx="46" ry="14" fill="white"/>
  <!-- Left swirl/curve that goes into the hole - this creates the torus depth -->
  <path d="M 52 46 C 60 35 90 32 110 38 C 92 36 72 40 66 52 C 60 54 52 52 52 46 Z" fill="#364152"/>
  
  <!-- ===== BANDS / SLICES ===== -->
  <!-- Gap between ring and band 1 is the funnel body -->
  
  <!-- Band 1 - widest band, just below the ring -->
  <path d="M 36 72 C 68 67 132 67 164 72 C 132 77 68 77 36 72 Z" fill="#364152"/>
  
  <!-- Band 2 -->
  <path d="M 50 88 C 75 83 125 83 150 88 C 125 93 75 93 50 88 Z" fill="#364152"/>
  
  <!-- Band 3 -->
  <path d="M 62 103 C 81 99 119 99 138 103 C 119 107 81 107 62 103 Z" fill="#364152"/>
  
  <!-- Band 4 -->
  <path d="M 72 117 C 86 113 114 113 128 117 C 114 121 86 121 72 117 Z" fill="#364152"/>
  
  <!-- ===== CONNECTING FUNNEL BODY between ring and bands ===== -->
  <!-- Body section 1: ring bottom edge to band 1 top -->
  <path d="M 36 72 C 68 67 132 67 164 72 
           C 140 68 130 65 128 62 
           C 120 59 115 57.5 110 57
           C 102 70 98 70 90 57
           C 85 57.5 80 59 72 62
           C 70 65 60 68 36 72 Z" fill="white"/>
  
  <!-- Filled wedge connecting ring bottom to band 1 -->
  <path d="M 34 74 L 40 68 C 68 63 132 63 160 68 L 164 74 
           C 132 79 68 79 34 74 Z" fill="#364152"/>
  
  <!-- Filled wedge connecting band 1 to band 2 -->
  <path d="M 38 76 L 50 88 C 75 93 125 93 150 88 L 162 76
           C 132 81 68 81 38 76 Z" fill="#364152"/>
  
  <!-- Filled wedge connecting band 2 to band 3 -->
  <path d="M 52 90 L 62 103 C 81 107 119 107 138 103 L 148 90
           C 125 95 75 95 52 90 Z" fill="#364152"/>
  
  <!-- Filled wedge connecting band 3 to band 4 -->
  <path d="M 64 105 L 72 117 C 86 121 114 121 128 117 L 136 105
           C 119 109 81 109 64 105 Z" fill="#364152"/>
  
  <!-- ===== NARROW FUNNEL TAIL ===== -->
  <!-- Below band 4, continuing to narrow -->
  <path d="M 74 119 C 87 123 113 123 126 119 L 118 133 C 107 137 93 137 82 133 Z" fill="#364152"/>
  
  <!-- Even narrower section -->
  <path d="M 83 135 C 91 138 109 138 117 135 L 111 148 C 106 151 94 151 89 148 Z" fill="#364152"/>
  
  <!-- ===== BOTTOM TEARDROP TIP ===== -->
  <path d="M 90 150 C 93 149 107 149 110 150 L 105 164 C 103 170 100 173 97 170 L 95 164 Z" fill="#364152"/>
</svg>