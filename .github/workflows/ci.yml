name: CI

on:
  push:
    branches: [main, master, "claude/**"]
  pull_request:
    branches: [main, master]

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  audit:
    name: Security Audit
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - run: npm ci
      - run: npm audit --audit-level=critical

  lint:
    name: Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - run: npm ci
      - run: npm run lint --workspace=apps/web

  type-check:
    name: Type Check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - run: npm ci
      - run: npm run type-check --workspace=apps/web
      - run: npm run type-check --workspace=apps/signal

  test:
    name: Tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - run: npm ci
      - run: npm test --workspace=apps/web

  parity-gates:
    name: Parity Gates (A11y, Focus, Critical Regressions)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - run: npm ci
      - run: npm run test:parity:critical --workspace=apps/web
      - run: npm run test:a11y:focus --workspace=apps/web
      - run: npm test --workspace=apps/signal

  migration-smoke:
    name: Migration Smoke Test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      # Install the Supabase CLI (used for `supabase db reset`)
      - name: Install Supabase CLI
        run: |
          curl -fsSL https://github.com/supabase/cli/releases/download/v2.3.8/supabase_linux_amd64.tar.gz \
            | tar -xz -C /usr/local/bin supabase
          supabase --version

      - name: Start local Supabase
        run: supabase start --ignore-health-check
        env:
          # Tell the CLI where to find the project (repo root)
          SUPABASE_PROJECT_ID: vortex

      - name: Run migration smoke test
        run: npm run test:migration-smoke
        env:
          PGHOST: localhost
          PGPORT: "54322"
          PGUSER: postgres
          PGPASSWORD: postgres
          PGDATABASE: postgres

      - name: Stop local Supabase
        if: always()
        run: supabase stop

  e2e:
    name: E2E Tests (Playwright)
    runs-on: ubuntu-latest
    env:
      NEXT_PUBLIC_SUPABASE_URL: http://localhost:54321
      NEXT_PUBLIC_SUPABASE_ANON_KEY: >-
        eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZS1kZW1vIiwicm9sZSI6ImFub24iLCJleHAiOjE5ODM4MTI5OTZ9.CRFA0NiK7W9oRm_2cPZ1K6rE5YJFGVdaRiROYYkFzFc
      SUPABASE_SERVICE_ROLE_KEY: >-
        eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZS1kZW1vIiwicm9sZSI6InNlcnZpY2Vfcm9sZSIsImV4cCI6MTk4MzgxMjk5Nn0.EGIM96RAZx35lJzdJsyH-qQwv8Hj04zWl196z2-SBc8
      NEXT_PUBLIC_APP_URL: http://localhost:3000
      PLAYWRIGHT_BASE_URL: http://localhost:3000
      # Silence Sentry in CI
      NEXT_PUBLIC_SENTRY_DSN: ""
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Install Playwright browsers
        run: npx playwright install --with-deps chromium
        working-directory: apps/web

      - name: Install Supabase CLI
        run: |
          curl -fsSL https://github.com/supabase/cli/releases/download/v2.3.8/supabase_linux_amd64.tar.gz \
            | tar -xz -C /usr/local/bin supabase
          supabase --version

      - name: Start local Supabase
        run: supabase start --ignore-health-check

      - name: Build Next.js app
        run: npm run build --workspace=apps/web

      - name: Start Next.js server
        run: npm run start --workspace=apps/web &
        # Give the server time to become ready
      - run: npx wait-on http://localhost:3000 --timeout 60000

      - name: Run Playwright E2E tests
        run: npm run test:e2e --workspace=apps/web

      - name: Upload Playwright report
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: playwright-report
          path: apps/web/playwright-report/
          retention-days: 7

      - name: Stop local Supabase
        if: always()
        run: supabase stop

  build:
    name: Build
    runs-on: ubuntu-latest
    needs: [lint, type-check, test, parity-gates]
    env:
      # Dummy values so Next.js build doesn't fail on missing env vars
      NEXT_PUBLIC_SUPABASE_URL: https://placeholder.supabase.co
      NEXT_PUBLIC_SUPABASE_ANON_KEY: placeholder
      NEXT_PUBLIC_APP_URL: https://placeholder.example.com
      NEXT_PUBLIC_SENTRY_DSN: ""
      CI: "true"
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - run: npm ci
      - run: npm run build --workspace=apps/web
      - run: npm run build --workspace=apps/signal
